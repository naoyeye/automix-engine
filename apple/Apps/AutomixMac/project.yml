name: AutomixMac
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.9
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CURRENT_PROJECT_VERSION: 2
    MARKETING_VERSION: 1.0.1
packages:
  AutomixPackage:
    path: ../../..
targets:
  AutomixMac:
    type: application
    platform: macOS
    sources:
      - path: ../../Examples/AutomixDemo/AutomixDemoApp.swift
      - path: ../../Examples/AutomixDemo/ContentView.swift
      - path: ../../Examples/AutomixDemo/EngineViewModel.swift
      - path: ../../Examples/AutomixDemo/MetadataService.swift
      - path: ../../Examples/AutomixDemo/TrackMetadataLoader.swift
      - path: ../../Examples/AutomixDemo/LastfmService.swift
      - path: ../../Examples/AutomixDemo/ScrobbleQueueStore.swift
      - path: ../../Examples/AutomixDemo/SystemNotifier.swift
      - path: Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.automix.mac
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist
    dependencies:
      - package: AutomixPackage
        product: Automix
schemes:
  AutomixMac:
    build:
      targets:
        AutomixMac: all
    run:
      config: Debug
